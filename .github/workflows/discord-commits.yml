name: Send Commit To Discord

on:
  push:
    branches:
      - '**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commit to Discord
        run: |
          REPO_NAME=${GITHUB_REPOSITORY#*/}  # removes 'itmoz/'

          # 1. Get the total number of commits from the event payload
          COMMIT_COUNT=$(jq '.commits | length' $GITHUB_EVENT_PATH)
          
          # 2. Pluralize the title text
          if [ "$COMMIT_COUNT" -eq 1 ]; then
            COMMIT_TEXT="1 new commit"
          else
            COMMIT_TEXT="$COMMIT_COUNT new commits"
          fi

          # 3. Build a description listing ALL commits
          # This extracts the short SHA, URL, and the first line of every commit message.
          # The gsub escapes any double quotes in commit messages so it doesn't break the JSON below.
          DESCRIPTION=$(jq -r '.commits | map("[[`" + (.id[0:7]) + "`]](" + .url + ") " + (.message | split("\n")[0] | gsub("\""; "\\\""))) | join("\\n")' $GITHUB_EVENT_PATH)

          # Random quotes list
          QUOTES=(
            "Ik sta zelf geregeld voor een groep HBO-ICT-studenten. Hun Nederlands is vaak slecht, hun Engels meestal nóg slechter. Paternotte spreekt over het gewenste resultaat, maar slaat daarbij twee noodzakelijke stappen over: 1: Herstel eerst het niveau van het Nederlands in basis- en middelbaar onderwijs Leerlingen en studenten hebben momenteel de grootste moeite zinnen te vormen in hun éigen taal, in het Nederlands. Los van de stortvloed aan taalfouten betekenen hun zinnen vaak iets anders dan hetgeen de leerlingen willen communiceren. Wie zich niet goed kan uitdrukken in zijn eigen taal, kan dat al helemáál niet in een vreemde taal. 2: Verbeter het niveau van het Engels dat leraren bezigen In mijn ervaring is het Engels van de meeste docenten vaak te slecht om onderwijs te geven op niveau. Dit geldt voor zowel middelbaar als hoger (beroeps)onderwijs. Voor de uitleg van complexe onderwerpen is een diep begrip van de gekozen taal nodig, inclusief het benodigde vocabulaire. Pas nádat deze twee stappen succesvol zijn afgerond, valt weer te denken aan Engels als voertaal op hogere onderwijsinstellingen."
          )

          # Pick a random quote
          RANDOM_QUOTE=$(printf "%s\n" "${QUOTES[@]}" | shuf -n 1)

          # Send to Discord
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"author\": {
                \"name\": \"${{ github.actor }}\",
                \"icon_url\": \"https://github.com/${{ github.actor }}.png\"
              },
              \"title\": \"[${REPO_NAME}:${{ github.ref_name }}] ${COMMIT_TEXT}\",
              \"url\": \"${{ github.event.compare }}\",
              \"description\": \"${DESCRIPTION}\",
              \"color\": 12733002,
              \"fields\": [
                {
                  \"name\": \"\u200b\",
                  \"value\": \"Matthew X. Quote: *${RANDOM_QUOTE}*\",
                  \"inline\": false
                }
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
