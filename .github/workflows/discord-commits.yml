name: Send Commit To Discord

on:
  push:
    branches:
      - '**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commit to Discord
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"GitHub Commits\",
            \"embeds\": [{
              \"author\": {
                \"name\": \"${{ github.actor }}\",
                \"icon_url\": \"https://github.com/${{ github.actor }}.png\"
              },
              \"description\": \"[${{ github.repository }}:${{ github.ref_name }}](${{ github.event.head_commit.url }}) 1 new commit\n[${SHORT_SHA}](${{ github.event.head_commit.url }}) ${{ github.event.head_commit.message }}\",
              \"color\": 5814783
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}